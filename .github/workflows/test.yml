name: Rust

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: hecrj/setup-rust-action@v2
        with:
          rust-version: stable
      - name: Check Cargo availability
        run: cargo --version
      - name: Check Rustup default toolchain
        run: rustup default | grep stable
      - name: Build without default features
        run: |
          env RUSTFLAGS="-C link-arg=-s" cargo check --no-default-features
      - name: Build with default features
        run: |
          env RUSTFLAGS="-C link-arg=-s" cargo check
      - name: Run tests
        run: |
          env RUSTFLAGS="-C link-arg=-s" cargo test
          env RUSTFLAGS="-C link-arg=-s" cargo test --package libdoh
